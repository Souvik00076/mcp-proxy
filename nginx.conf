# Nginx configuration for Spendly application
server {
    listen 80;
    server_name email-mcp.souvikb.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp-email.souvikb.in;

    ssl_certificate /etc/letsencrypt/live/mcp-email.souvikb.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp-email.souvikb.in/privkey.pem;

    # Block sensitive files
    location ~ /\.(env|git|bak|config|sql|log|htaccess|htpasswd)$ {
        deny all;
        return 404;
    }
    # Block sensitive paths
    location ~ ^/(public/)?\.(env|git) {
        deny all;
        return 404;
    }
    # Block common scanner paths
    location ~ ^/(wp-admin|wp-login|phpmyadmin|admin\.php) {
        deny all;
        return 404;
    }
    # Block scanner user agents
    if ($http_user_agent ~* (zgrab|nikto|sqlmap|nmap|masscan|censys|shodan)) {
        return 403;
    }

    # Logging
    access_log /var/log/nginx/mcp-email-access.log;
    error_log /var/log/nginx/mcp-email-error.log;

    # Client body size limit
    client_max_body_size 1M;

    location / {
        proxy_pass http://email-server:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}



